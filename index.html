<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes Recettes</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAF8F3;
    --card: #FFFFFF;
    --text: #1A1A18;
    --muted: #8A8880;
    --accent: #C8A96E;
    --accent-light: #F5EDD8;
    --green: #3D6B4F;
    --green-light: #E6F0EA;
    --border: #E8E4DB;
    --tag-bg: #F0EDE6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }
  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); }
  .logo-mark { width: 36px; height: 36px; background: var(--text); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .logo-mark svg { width: 20px; height: 20px; fill: var(--bg); }
  .logo-name { font-family: 'Playfair Display', serif; font-size: 1.2rem; letter-spacing: -0.01em; }
  .header-count { font-size: 0.8rem; color: var(--muted); background: var(--tag-bg); padding: 4px 10px; border-radius: 20px; }

  /* HERO */
  .hero {
    padding: 3rem 2rem 2rem;
    max-width: 900px; margin: 0 auto;
  }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 0.5rem;
  }
  .hero h1 em { font-style: italic; color: var(--accent); }
  .hero p { color: var(--muted); font-size: 1rem; font-weight: 300; }

  /* SEARCH & FILTERS */
  .controls {
    max-width: 900px; margin: 0 auto;
    padding: 1.5rem 2rem;
    display: flex; flex-direction: column; gap: 1rem;
  }
  .search-wrap { position: relative; }
  .search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; stroke: var(--muted); fill: none; }
  #search {
    width: 100%;
    padding: 12px 16px 12px 42px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    background: var(--card);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--muted); }

  .filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn {
    padding: 6px 14px;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    background: var(--card);
    color: var(--muted);
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--text); border-color: var(--text); color: var(--bg); }

  /* GRID */
  .grid-section { max-width: 900px; margin: 0 auto; padding: 0 2rem 4rem; }
  .results-info { font-size: 0.8rem; color: var(--muted); margin-bottom: 1.2rem; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 16px;
  }

  /* CARD */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
  .card-thumb {
    height: 100px;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.8rem;
    position: relative;
  }
  .card-thumb.color-1 { background: #F5EDD8; }
  .card-thumb.color-2 { background: #E6F0EA; }
  .card-thumb.color-3 { background: #F0E8F5; }
  .card-thumb.color-4 { background: #E8EFF5; }
  .card-thumb.color-5 { background: #F5E8E8; }
  .card-thumb.color-6 { background: #E8F5F2; }
  .card-body { padding: 14px 16px; }
  .card-tag {
    display: inline-block;
    font-size: 0.68rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    line-height: 1.3;
    margin-bottom: 10px;
    color: var(--text);
  }
  .card-meta { display: flex; align-items: center; gap: 8px; }
  .meta-pill {
    font-size: 0.72rem;
    padding: 3px 9px;
    border-radius: 10px;
    background: var(--tag-bg);
    color: var(--muted);
  }
  .meta-pill.veg { background: var(--green-light); color: var(--green); }

  /* NO RESULTS */
  .no-results { text-align: center; padding: 4rem 2rem; color: var(--muted); }
  .no-results span { font-size: 2.5rem; display: block; margin-bottom: 1rem; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(26,26,24,0.6);
    backdrop-filter: blur(4px);
    display: none; align-items: center; justify-content: center;
    padding: 1rem;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card);
    border-radius: 18px;
    max-width: 620px; width: 100%;
    max-height: 88vh;
    overflow-y: auto;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
  .modal-header {
    padding: 1.5rem 1.5rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem;
  }
  .modal-thumb { font-size: 2.5rem; margin-bottom: 4px; }
  .modal-tag { font-size: 0.7rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.07em; color: var(--accent); margin-bottom: 6px; }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; line-height: 1.2; color: var(--text); }
  .modal-close {
    background: var(--tag-bg); border: none; cursor: pointer;
    width: 32px; height: 32px; border-radius: 50%; font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); flex-shrink: 0; margin-top: 4px;
    transition: background 0.15s;
  }
  .modal-close:hover { background: var(--border); }
  .modal-body { padding: 1.5rem; }
  .modal-section { margin-bottom: 1.5rem; }
  .modal-section h3 {
    font-size: 0.72rem; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--muted);
    margin-bottom: 0.75rem; padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .ingredients-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
  .ingredients-list li {
    font-size: 0.9rem; padding: 6px 10px;
    background: var(--bg); border-radius: 8px;
    display: flex; align-items: center; gap: 8px;
    line-height: 1.4;
  }
  .ingredients-list li::before { content: '·'; color: var(--accent); font-size: 1.2rem; flex-shrink: 0; }
  .steps-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  .steps-list li { display: flex; gap: 12px; font-size: 0.9rem; line-height: 1.6; }
  .step-num {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--accent-light); color: var(--accent);
    font-size: 0.75rem; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 2px;
  }
  .modal-note {
    background: var(--bg); border-left: 3px solid var(--accent);
    padding: 10px 14px; border-radius: 0 8px 8px 0;
    font-size: 0.85rem; color: var(--muted); font-style: italic;
    margin-top: 0.5rem;
  }
  .source-link {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 0.8rem; color: var(--accent); text-decoration: none;
    padding: 6px 12px; border: 1px solid var(--accent-light);
    border-radius: 8px; margin-top: 0.5rem;
    transition: background 0.15s;
  }
  .source-link:hover { background: var(--accent-light); }

  /* SCROLLBAR */
  .modal::-webkit-scrollbar { width: 6px; }
  .modal::-webkit-scrollbar-track { background: transparent; }
  .modal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>

const tagEmojis = {
  'Salade': '🥗', 'Plat': '🍽', 'Végétarien': '🌱', 'Soupe': '🍵',
  'Quiche / Tarte': '🥧', 'Dessert': '🍮', 'Entrée / Apéro': '🥚', 'Rapide': '⚡'
};

let currentTag = 'Toutes';
let currentSearch = '';

function renderGrid() {
  const grid = document.getElementById('grid');
  const noRes = document.getElementById('no-results');
  const info = document.getElementById('results-info');
  const q = currentSearch.toLowerCase();
  const filtered = RECIPES.filter(r => {
    const matchTag = currentTag === 'Toutes' || r.tag === currentTag || (currentTag === 'Végétarien' && r.veg);
    const matchSearch = !q || r.title.toLowerCase().includes(q) || r.ingredients.join(' ').toLowerCase().includes(q);
    return matchTag && matchSearch;
  });
  info.textContent = filtered.length + ' recette' + (filtered.length > 1 ? 's' : '');
  document.getElementById('header-count').textContent = RECIPES.length + ' recettes';
  if (!filtered.length) { grid.innerHTML = ''; noRes.style.display = 'block'; return; }
  noRes.style.display = 'none';
  grid.innerHTML = filtered.map(r => `
    <div class="card" onclick="openModal(${r.id})">
      <div class="card-thumb ${r.color}">${r.emoji}</div>
      <div class="card-body">
        <div class="card-tag">${r.tag}</div>
        <div class="card-title">${r.title}</div>
        <div class="card-meta">
          ${r.time ? `<span class="meta-pill">⏱ ${r.time}</span>` : ''}
          ${r.veg ? `<span class="meta-pill veg">🌱 Végé</span>` : ''}
        </div>
      </div>
    </div>
  `).join('');
}

function openModal(id) {
  const r = RECIPES.find(x => x.id === id);
  if (!r) return;
  document.getElementById('m-thumb').textContent = r.emoji;
  document.getElementById('m-tag').textContent = r.tag + (r.time ? ' · ' + r.time : '');
  document.getElementById('m-title').textContent = r.title;
  const body = document.getElementById('m-body');
  body.innerHTML = `
    ${r.video ? `
      <div class="modal-section">
        <video controls style="width:100%; border-radius:10px; max-height:280px; background:#000;">
          <source src="${r.video}" type="video/mp4">
        </video>
      </div>
    ` : ''}
    <div class="modal-section">
      <h3>Ingrédients</h3>
      <ul class="ingredients-list">
        ${r.ingredients.map(i => `<li>${i}</li>`).join('')}
      </ul>
    </div>
    <div class="modal-section">
      <h3>Préparation</h3>
      <ol class="steps-list">
        ${r.steps.map((s, i) => `<li><span class="step-num">${i+1}</span><span>${s}</span></li>`).join('')}
      </ol>
      ${r.note ? `<div class="modal-note">💡 ${r.note}</div>` : ''}
    </div>
    ${r.source ? `<a href="${r.source}" target="_blank" class="source-link">↗ Voir le post Instagram original</a>` : ''}
  `;
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('search').addEventListener('input', e => {
  currentSearch = e.target.value;
  renderGrid();
});

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentTag = btn.dataset.tag;
  renderGrid();
});

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

renderGrid();
</script>
