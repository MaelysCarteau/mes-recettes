<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes Recettes</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAF8F3;
    --card: #FFFFFF;
    --text: #1A1A18;
    --muted: #8A8880;
    --accent: #C8A96E;
    --accent-light: #F5EDD8;
    --green: #3D6B4F;
    --green-light: #E6F0EA;
    --border: #E8E4DB;
    --tag-bg: #F0EDE6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }
  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); }
  .logo-mark { width: 36px; height: 36px; background: var(--text); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .logo-mark svg { width: 20px; height: 20px; fill: var(--bg); }
  .logo-name { font-family: 'Playfair Display', serif; font-size: 1.2rem; letter-spacing: -0.01em; }
  .header-count { font-size: 0.8rem; color: var(--muted); background: var(--tag-bg); padding: 4px 10px; border-radius: 20px; }

  /* Bouton d'ajout */
  .add-btn {
    padding: 8px 16px;
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
  }

  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    padding: 1rem;
  }

  .form-modal {
    background: var(--card);
    border-radius: 18px;
    padding: 2rem;
    width: 100%; max-width: 560px;
    max-height: 90vh; overflow-y: auto;
    display: flex; flex-direction: column; gap: 1rem;
  }

  .form-modal h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
  }

  .form-field { display: flex; flex-direction: column; gap: 4px; }
  .form-field label { font-size: 0.8rem; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
  .form-field input,
  .form-field textarea,
  .form-field select {
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    background: var(--bg);
    color: var(--text);
    outline: none;
    resize: vertical;
  }
  .form-field input:focus,
  .form-field textarea:focus { border-color: var(--accent); }

  .form-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-cancel {
    padding: 10px 18px; border: 1.5px solid var(--border);
    border-radius: 10px; cursor: pointer; background: var(--card);
    font-family: 'DM Sans', sans-serif;
  }
  .btn-save {
    padding: 10px 18px; border: none;
    background: var(--text); color: var(--bg);
    border-radius: 10px; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }

  /* HERO */
  .hero {
    padding: 3rem 2rem 2rem;
    max-width: 900px; margin: 0 auto;
  }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 0.5rem;
  }
  .hero h1 em { font-style: italic; color: var(--accent); }
  .hero p { color: var(--muted); font-size: 1rem; font-weight: 300; }

  /* SEARCH & SORT & FILTERS */
  .controls {
    max-width: 900px; margin: 0 auto;
    padding: 1.5rem 2rem;
    display: flex; flex-direction: column; gap: 1rem;
  }
  .search-wrap { position: relative; }
  .search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; stroke: var(--muted); fill: none; }
  #search {
    width: 100%;
    padding: 12px 16px 12px 42px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    background: var(--card);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--muted); }

  .sort-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .sort-label {
    font-size: 0.9rem;
    color: var(--muted);
  }

  .sort-select {
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    background: var(--card);
    color: var(--text);
    outline: none;
    cursor: pointer;
  }

  .sort-select:focus {
    border-color: var(--accent);
  }

  .filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn {
    padding: 6px 14px;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    background: var(--card);
    color: var(--muted);
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--text); border-color: var(--text); color: var(--bg); }

  /* GRID */
  .grid-section { max-width: 900px; margin: 0 auto; padding: 0 2rem 4rem; }
  .results-info { font-size: 0.8rem; color: var(--muted); margin-bottom: 1.2rem; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 16px;
  }

  /* CARD */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
  .card-thumb {
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.8rem;
    position: relative;
  }
  .card-thumb.color-1 { background: #F5EDD8; }
  .card-thumb.color-2 { background: #E6F0EA; }
  .card-thumb.color-3 { background: #F0E8F5; }
  .card-thumb.color-4 { background: #E8EFF5; }
  .card-thumb.color-5 { background: #F5E8E8; }
  .card-thumb.color-6 { background: #E8F5F2; }
  .card-body { padding: 14px 16px; }

  /* Tags multiples sur la carte */
  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 6px;
  }
  .card-tag {
    display: inline-block;
    font-size: 0.68rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--accent);
  }
  .card-tag + .card-tag::before {
    content: '·';
    margin-right: 4px;
    color: var(--border);
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    line-height: 1.3;
    margin-bottom: 10px;
    color: var(--text);
  }
  .card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .meta-pill {
    font-size: 0.72rem;
    padding: 3px 9px;
    border-radius: 10px;
    background: var(--tag-bg);
    color: var(--muted);
  }
  .meta-pill.veg { background: var(--green-light); color: var(--green); }

  .card-thumb.has-image {
    height: auto;
    background: none;
    display: block;
  }

  .card-thumb.has-image img {
    width: 100%;
    height: auto;
    display: block;
  }

  /* RECIPE PAGE */
  .recipe-page {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem;
  }

  .recipe-page-inner {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
  }

  .back-btn {
    margin: 1.5rem;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--card);
    color: var(--text);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
  }

  .back-btn:hover {
    border-color: var(--accent);
  }

  .recipe-hero-image {
    width: 100%;
    max-height: 380px;
    object-fit: cover;
    display: block;
  }

  .recipe-page-header {
    padding: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  /* Tags multiples sur la page recette */
  .recipe-page-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 8px;
  }
  .recipe-page-tag {
    display: inline-block;
    font-size: 0.75rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    background: var(--accent-light);
    padding: 3px 10px;
    border-radius: 20px;
  }

  .recipe-page-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    line-height: 1.2;
    margin-bottom: 12px;
  }

  .recipe-page-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .recipe-page-body {
    padding: 1.5rem;
  }

  .recipe-page-section {
    margin-bottom: 2rem;
  }

  .recipe-page-section h3 {
    font-size: 0.8rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 0.8rem;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .recipe-video-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .recipe-video {
    display: block;
    max-width: 100%;
    max-height: 75vh;
    width: auto;
    height: auto;
    border-radius: 12px;
    background: #000;
  }

  /* NO RESULTS */
  .no-results { text-align: center; padding: 4rem 2rem; color: var(--muted); }
  .no-results span { font-size: 2.5rem; display: block; margin-bottom: 1rem; }

  /* MODAL */
  .ingredients-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
  .ingredients-list li {
    font-size: 0.9rem; padding: 6px 10px;
    background: var(--bg); border-radius: 8px;
    display: flex; align-items: center; gap: 8px;
    line-height: 1.4;
  }
  .ingredients-list li::before { content: '·'; color: var(--accent); font-size: 1.2rem; flex-shrink: 0; }
  .steps-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  .steps-list li { display: flex; gap: 12px; font-size: 0.9rem; line-height: 1.6; }
  .step-num {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--accent-light); color: var(--accent);
    font-size: 0.75rem; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 2px;
  }
  .modal-note {
    background: var(--bg); border-left: 3px solid var(--accent);
    padding: 10px 14px; border-radius: 0 8px 8px 0;
    font-size: 0.85rem; color: var(--muted); font-style: italic;
    margin-top: 0.5rem;
  }
  .source-link {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 0.8rem; color: var(--accent); text-decoration: none;
    padding: 6px 12px; border: 1px solid var(--accent-light);
    border-radius: 8px; margin-top: 0.5rem;
    transition: background 0.15s;
  }
  .source-link:hover { background: var(--accent-light); }
</style>
</head>
<body>

<header>
  <a href="#" class="logo" onclick="goBackToList(); return false;">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><path d="M18.06 22.99h1.66c.84 0 1.53-.64 1.63-1.46L23 5.05h-5V1h-1.97v4.05h-4.97l.3 2.34c1.71.47 3.31 1.32 4.27 2.26 1.44 1.42 2.43 2.89 2.43 5.29v8.05zM1 21.99V21h15.03v.99c0 .55-.45 1-1.01 1H2.01c-.56 0-1.01-.45-1.01-1zm15.03-7c0-4.5-7.5-5-7.5-5s-7.5.5-7.5 5h15z"/></svg>
    </div>
    <span class="logo-name">Mes Recettes</span>
  </a>
  <span class="header-count" id="header-count">37 recettes</span>
  <button class="add-btn" onclick="openAddForm()">+ Ajouter</button>
</header>

<div class="hero">
  <h1>Toutes mes recettes,<br><em>au même endroit.</em></h1>
</div>

<div class="controls">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Rechercher une recette, un ingrédient…">
  </div>
  <div class="sort-wrap">
    <label for="sort" class="sort-label">Trier :</label>
    <select id="sort" class="sort-select">
      <option value="default">Ordre par défaut</option>
      <option value="az">Alphabétique (A → Z)</option>
      <option value="za">Alphabétique (Z → A)</option>
      <option value="time-asc">Temps de préparation (court → long)</option>
      <option value="time-desc">Temps de préparation (long → court)</option>
    </select>
  </div>
  <div class="filters" id="filters">
    <button class="filter-btn active" data-tag="Toutes">Toutes</button>
    <button class="filter-btn" data-tag="Végétarien">🌱 Végétarien</button>
    <button class="filter-btn" data-tag="Plat">🍽 Plats</button>
    <button class="filter-btn" data-tag="Salade">🥗 Salades</button>
    <button class="filter-btn" data-tag="Soupe">🍵 Soupes</button>
    <button class="filter-btn" data-tag="Quiche / Tarte">🥧 Quiches & Tartes</button>
    <button class="filter-btn" data-tag="Dessert">🍮 Desserts</button>
    <button class="filter-btn" data-tag="Entrée / Apéro">🥚 Entrées</button>
    <button class="filter-btn" data-tag="Rapide">⚡ Rapide</button>
  </div>
</div>

<div class="grid-section">
  <p class="results-info" id="results-info"></p>
  <div class="grid" id="grid"></div>
  <div class="no-results" id="no-results" style="display:none">
    <span>🔍</span>Aucune recette trouvée pour cette recherche.
  </div>
</div>

<div class="recipe-page" id="recipe-page" style="display:none;">
  <div class="recipe-page-inner">
    <button class="back-btn" onclick="goBackToList()">← Retour aux recettes</button>
    <div id="recipe-content"></div>
  </div>
</div>

<div class="overlay" id="add-overlay" style="display:none">
  <div class="form-modal">
    <h2>Nouvelle recette</h2>
    <div class="form-field">
      <label>Titre</label>
      <input type="text" id="f-title" placeholder="Ex : Ramen au miso">
    </div>
    <div class="form-field">
      <label>Emoji</label>
      <input type="text" id="f-emoji" placeholder="🍜" maxlength="2">
    </div>
    <div class="form-field">
      <label>Tags (séparés par des virgules)</label>
      <input type="text" id="f-tags" placeholder="Plat, Végétarien, Rapide">
    </div>
    <div class="form-field">
      <label>Temps</label>
      <input type="text" id="f-time" placeholder="30 min">
    </div>
    <div class="form-field">
      <label>Végétarien ?</label>
      <select id="f-veg">
        <option value="false">Non</option>
        <option value="true">Oui</option>
      </select>
    </div>
    <div class="form-field">
      <label>Ingrédients (un par ligne)</label>
      <textarea id="f-ingredients" rows="5" placeholder="200g de pâtes&#10;2 œufs&#10;..."></textarea>
    </div>
    <div class="form-field">
      <label>Étapes (une par ligne)</label>
      <textarea id="f-steps" rows="5" placeholder="Cuire les pâtes...&#10;Mélanger..."></textarea>
    </div>
    <div class="form-field">
      <label>Note (optionnel)</label>
      <input type="text" id="f-note" placeholder="Astuce ou conseil...">
    </div>
    <div class="form-field">
      <label>Lien source (optionnel)</label>
      <input type="text" id="f-source" placeholder="https://instagram.com/...">
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeAddForm()">Annuler</button>
      <button class="btn-save" onclick="saveNewRecipe()">Enregistrer</button>
    </div>
  </div>
</div>

<script>
// ─── DONNÉES ──────────────────────────────────────────────────────────────────
// Chaque recette accepte désormais un tableau `tags` (multi-valeurs).
// Le premier tag du tableau est considéré comme le tag "principal" (affiché en premier).
let RECIPES = [];

// ─── LOGIQUE ──────────────────────────────────────────────────────────────────

let currentTag = 'Toutes';
let currentSearch = '';
let currentSort = 'default';

function getTimeInMinutes(timeStr) {
  if (!timeStr) return Infinity;
  const str = timeStr.toLowerCase();
  if (str.includes('variable')) return Infinity;
  let total = 0;
  const hourMatch = str.match(/(\d+)\s*h/);
  const minMatch = str.match(/(\d+)\s*min/);
  if (hourMatch) total += parseInt(hourMatch[1]) * 60;
  if (minMatch) total += parseInt(minMatch[1]);
  return total || Infinity;
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const noRes = document.getElementById('no-results');
  const info = document.getElementById('results-info');
  const q = currentSearch.toLowerCase();

  let filtered = RECIPES.filter(r => {
    const tags = r.tags || [];
    const ingredients = r.ingredients || [];
    const steps = r.steps || [];

    const matchTag =
      currentTag === 'Toutes' ||
      tags.includes(currentTag);

    const searchableText = [
      r.title || '',
      r.time || '',
      r.note || '',
      ...tags,
      ...ingredients,
      ...steps
    ].join(' ').toLowerCase();

    const matchSearch = !q || searchableText.includes(q);

    return matchTag && matchSearch;
  });

  filtered.sort((a, b) => {
    if (currentSort === 'az') return a.title.localeCompare(b.title, 'fr', { sensitivity: 'base' });
    if (currentSort === 'za') return b.title.localeCompare(a.title, 'fr', { sensitivity: 'base' });
    if (currentSort === 'time-asc') return getTimeInMinutes(a.time) - getTimeInMinutes(b.time);
    if (currentSort === 'time-desc') return getTimeInMinutes(b.time) - getTimeInMinutes(a.time);
    return a.id - b.id;
  });

  info.textContent = filtered.length + ' recette' + (filtered.length > 1 ? 's' : '');
  document.getElementById('header-count').textContent = RECIPES.length + ' recettes';

  if (!filtered.length) { grid.innerHTML = ''; noRes.style.display = 'block'; return; }
  noRes.style.display = 'none';

  grid.innerHTML = filtered.map(r => `
    <div class="card" onclick="openRecipePage(${r.id})">
      <div class="card-thumb ${r.color} ${r.image ? 'has-image' : ''}">
        ${r.image ? `<img src="${r.image}" alt="${r.title}" loading="lazy">` : r.emoji}
      </div>
      <div class="card-body">
        <div class="card-tags">
          ${(r.tags || []).map(t => `<span class="card-tag">${t}</span>`).join('')}
        </div>
        <div class="card-title">${r.title}</div>
        <div class="card-meta">
          ${r.time ? `<span class="meta-pill">⏱ ${r.time}</span>` : ''}
          ${r.veg ? `<span class="meta-pill veg">🌱 Végé</span>` : ''}
        </div>
      </div>
    </div>
  `).join('');
}

function openRecipePage(id) {
  const url = new URL(window.location);
  url.searchParams.set('id', id);
  window.history.pushState({}, '', url);
  renderPage();
}

function goBackToList() {
  const url = new URL(window.location);
  url.searchParams.delete('id');
  window.history.pushState({}, '', url);
  renderPage();
}

function renderRecipePage(id) {
  const r = RECIPES.find(x => x.id === id);

  if (!r) {
    goBackToList();
    return;
  }

  document.querySelector('.hero').style.display = 'none';
  document.querySelector('.controls').style.display = 'none';
  document.querySelector('.grid-section').style.display = 'none';
  document.getElementById('recipe-page').style.display = 'block';

  const recipeContent = document.getElementById('recipe-content');
  recipeContent.innerHTML = `
    ${r.image ? `<img src="${r.image}" alt="${r.title}" class="recipe-hero-image">` : ''}

    <div class="recipe-page-header">
      <div class="recipe-page-tags">
        ${(r.tags || []).map(t => `<span class="recipe-page-tag">${t}</span>`).join('')}
      </div>
      <div class="recipe-page-title">${r.title}</div>
      <div class="recipe-page-meta">
        ${r.time ? `<span class="meta-pill">⏱ ${r.time}</span>` : ''}
        ${r.veg ? `<span class="meta-pill veg">🌱 Végé</span>` : ''}
      </div>
    </div>

    <div class="recipe-page-body">
      ${r.video ? `
        <div class="recipe-page-section">
          <div class="recipe-video-wrap">
            <video controls preload="metadata" ${r.image ? `poster="${r.image}"` : ''} class="recipe-video">
              <source src="${r.video}" type="video/mp4">
            </video>
          </div>
        </div>
      ` : ''}

      <div class="recipe-page-section">
        <h3>Ingrédients</h3>
        <ul class="ingredients-list">
          ${(r.ingredients || []).map(i => `<li>${i}</li>`).join('')}
        </ul>
      </div>

      <div class="recipe-page-section">
        <h3>Préparation</h3>
        <ol class="steps-list">
          ${(r.steps || []).map((s, i) => `<li><span class="step-num">${i+1}</span><span>${s}</span></li>`).join('')}
        </ol>
        ${r.note ? `<div class="modal-note">💡 ${r.note}</div>` : ''}
      </div>

      ${r.source ? `<a href="${r.source}" target="_blank" rel="noopener noreferrer" class="source-link">↗ Voir le post Instagram original</a>` : ''}
    </div>
  `;
}

// Charge les recettes custom depuis localStorage et les fusionne
const CUSTOM_KEY = 'mes-recettes-custom';

function loadCustomRecipes() {
  const stored = localStorage.getItem(CUSTOM_KEY);
  if (!stored) return;
  const custom = JSON.parse(stored);
  // Ajoute au début pour les voir en premier
  RECIPES.unshift(...custom);
}

function openAddForm() {
  document.getElementById('add-overlay').style.display = 'flex';
}

function closeAddForm() {
  document.getElementById('add-overlay').style.display = 'none';
}

function saveNewRecipe() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { alert('Le titre est obligatoire !'); return; }

  const stored = localStorage.getItem(CUSTOM_KEY);
  const custom = stored ? JSON.parse(stored) : [];

  const newId = Date.now(); // ID unique basé sur l'horodatage
  const colors = ['color-1','color-2','color-3','color-4','color-5','color-6'];

  const recipe = {
    id: newId,
    title,
    emoji: document.getElementById('f-emoji').value || '🍽',
    color: colors[Math.floor(Math.random() * colors.length)],
    tags: document.getElementById('f-tags').value.split(',').map(t => t.trim()).filter(Boolean),
    time: document.getElementById('f-time').value.trim(),
    veg: document.getElementById('f-veg').value === 'true',
    ingredients: document.getElementById('f-ingredients').value.split('\n').map(l => l.trim()).filter(Boolean),
    steps: document.getElementById('f-steps').value.split('\n').map(l => l.trim()).filter(Boolean),
    note: document.getElementById('f-note').value.trim(),
    source: document.getElementById('f-source').value.trim(),
  };

  custom.unshift(recipe);
  localStorage.setItem(CUSTOM_KEY, JSON.stringify(custom));
  RECIPES.unshift(recipe);

  closeAddForm();
  renderGrid();
}

loadCustomRecipes();

function renderPage() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  if (id) {
    renderRecipePage(Number(id));
  } else {
    document.querySelector('.hero').style.display = '';
    document.querySelector('.controls').style.display = '';
    document.querySelector('.grid-section').style.display = '';
    document.getElementById('recipe-page').style.display = 'none';
    renderGrid();
  }
}

window.addEventListener('popstate', renderPage);

document.getElementById('search').addEventListener('input', e => {
  currentSearch = e.target.value;
  renderGrid();
});

document.getElementById('sort').addEventListener('change', e => {
  currentSort = e.target.value;
  renderGrid();
});

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentTag = btn.dataset.tag;
  renderGrid();
});

fetch('recettes.json')
  .then(response => {
    if (!response.ok) {
      throw new Error(`Erreur HTTP ${response.status} lors du chargement de recettes.json`);
    }
    return response.json();
  })
  .then(data => {
    RECIPES = data;
    document.getElementById('header-count').textContent = RECIPES.length + ' recettes';
    renderPage();
  })
  .catch(error => {
    console.error('Erreur de chargement des recettes :', error);
    document.getElementById('results-info').textContent =
      'Impossible de charger les recettes. Vérifie recettes.json et lance le site avec Live Server.';
  });
</script>
</body>
</html>
